name: Release Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify contract artifacts are current
        run: |
          python scripts/check_runtime_contract_env.py
          make misuse-prevention-test PY=python
          python scripts/generate_contract_artifacts.py --check
          python scripts/check_release_metadata.py
          python scripts/validate_model_manifests.py --strict --require-explicit-ngra --curated-publication-set

      - name: Build and validate release artifacts
        run: |
          python scripts/check_distribution_artifacts.py --artifact-dir dist --report-path dist/release-artifact-report.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbpk-release-artifacts-${{ github.ref_name || github.run_id }}
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/release-artifact-report.json
          if-no-files-found: error
