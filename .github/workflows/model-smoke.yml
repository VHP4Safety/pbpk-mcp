name: Model Smoke

on:
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

concurrency:
  group: model-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  workspace-model-smoke:
    name: Workspace Model Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Prepare runtime directories
        run: |
          mkdir -p var/jobs var/population-results

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build rxode2 worker image
        run: ./scripts/build_rxode2_worker_image.sh

      - name: Deploy packaged local stack
        run: ./scripts/deploy_rxode2_stack.sh

      - name: Wait for API health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for http://127.0.0.1:8000/health" >&2
          exit 1

      - name: Run release readiness gate
        run: |
          python3 scripts/release_readiness_check.py --skip-unit-tests | tee var/release_readiness_summary.json

      - name: Run live misuse-prevention gate
        run: |
          make misuse-prevention-live-test PY=python3

      - name: Run workspace model smoke
        run: |
          python3 scripts/workspace_model_smoke.py --include-population --auth-dev-secret pbpk-local-dev-secret | tee var/workspace_model_smoke_summary.txt
          python3 scripts/workspace_model_smoke.py --search reference_compound --include-population --auth-dev-secret pbpk-local-dev-secret --output var/workspace_model_smoke_rxode2_report.json

      - name: Capture compose diagnostics
        if: always()
        run: |
          docker compose -f docker-compose.celery.yml -p pbpk_mcp ps > var/model_smoke_compose_ps.txt
          docker compose -f docker-compose.celery.yml -p pbpk_mcp logs --no-color > var/model_smoke_docker_logs.txt

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbpk-model-smoke-${{ github.run_id }}
          path: |
            var/release_readiness_summary.json
            var/workspace_model_smoke_report.json
            var/workspace_model_smoke_rxode2_report.json
            var/workspace_model_smoke_summary.txt
            var/model_smoke_compose_ps.txt
            var/model_smoke_docker_logs.txt
          if-no-files-found: error
